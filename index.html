const KEY_WORDS='b1_full_words_v1', KEY_PROGRESS='b1_full_progress_v1', KEY_STREAK='b1_full_streak_v1';
let words = JSON.parse(localStorage.getItem(KEY_WORDS) || 'null') || BUILT_IN_WORDS;
let progress = JSON.parse(localStorage.getItem(KEY_PROGRESS) || '{}');
let currentPage='home', cardIndex=0, quizIndex=0, showAnswer=false, activeTheme='All', search='', mode='daily', quizDirection='de-en', quizReviewMode=false;
function save(){localStorage.setItem(KEY_WORDS,JSON.stringify(words));localStorage.setItem(KEY_PROGRESS,JSON.stringify(progress));}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function p(w){if(!progress[w.de])progress[w.de]={known:false,fav:false,wrong:0,seen:0};return progress[w.de];}
function todayKey(){return new Date().toISOString().slice(0,10)}function markStudy(){const d=JSON.parse(localStorage.getItem(KEY_STREAK)||'{}');if(d.last!==todayKey()){const y=new Date(Date.now()-86400000).toISOString().slice(0,10);d.count=d.last===y?(d.count||0)+1:1;d.last=todayKey();localStorage.setItem(KEY_STREAK,JSON.stringify(d));}}
function streak(){return JSON.parse(localStorage.getItem(KEY_STREAK)||'{"count":0}').count||0}
function todayWords(){const startDate=new Date('2026-05-25T00:00:00');const day=Math.max(0,Math.floor((new Date()-startDate)/86400000));const start=(day*30)%Math.max(1,words.length);return [...words,...words].slice(start,start+Math.min(30,words.length));}
function themes(){return ['All',...Array.from(new Set(words.map(w=>w.theme))).sort()]}
function filtered(){return words.filter(w=>(activeTheme==='All'||w.theme===activeTheme)&&(w.de+' '+w.en+' '+w.theme+' '+w.example).toLowerCase().includes(search.toLowerCase()))}
function normalize(s){return(s||'').toLowerCase().trim().replace(/[.,!?;:()]/g,'')}
function normalizeGermanInput(s) {
  return (s || '')
    .toLowerCase()
    .trim()
    .replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue').replace(/ß/g, 'ss')
    .replace(/[.,!?;:()]/g,'')
    .replace(/\s+/g,' ');
}
function getGermanAnswerVariants(de) {
  const base = (de || '').trim();
  const withoutArticle = base
    .replace(/^(der|die|das|den|dem|ein|eine|einen|einem)\s+/i, '')
    .trim();
  const parts = [base, withoutArticle];
  return [...new Set(parts.filter(Boolean).map(normalizeGermanInput))];
}
function isGermanAnswerCorrect(user, de) {
  const u = normalizeGermanInput(user);
  if (!u || u.length < 2) return false;
  return getGermanAnswerVariants(de).some(v => u === v || (v.length > 4 && u.includes(v)) || (u.length > 4 && v.includes(u)));
}
function isEnglishAnswerCorrect(user, en) {
  const u = normalize(user);
  if (!u || u.length < 2 || en === 'Add/check meaning') return false;
  return en.split('/').some(x => normalize(x).includes(u) || u.includes(normalize(x)));
}

function render(){['home','daily','cards','quiz','add'].forEach(id=>document.getElementById(id).classList.toggle('hidden',id!==currentPage));document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.page===currentPage));renderHome();renderDaily();renderCards();renderQuiz();renderAdd();save();}
function renderHome(){const known=words.filter(w=>p(w).known).length,fav=words.filter(w=>p(w).fav).length,wrong=words.filter(w=>p(w).wrong>0).length;document.getElementById('home').innerHTML=`
<div class="card"><h2>Welcome back</h2><p class="small">This version includes ${words.length} entries. Some Goethe imports are first-pass and can be edited as you study.</p>
<div class="row"><div class="stat"><b>${words.length}</b><span>words</span></div><div class="stat"><b>${known}</b><span>known</span></div><div class="stat"><b>${fav}</b><span>favorites</span></div><div class="stat"><b>${wrong}</b><span>review</span></div><div class="stat"><b>${streak()}</b><span>streak</span></div></div></div>
<div class="card"><h2>Study flow</h2><p>1. Review <b>Today</b>.<br>2. Drill in <b>Cards</b>.<br>3. Use <b>Quiz</b>; wrong answers return to review.</p><div class="row"><button class="primary" onclick="go('daily')">Start today</button><button onclick="go('quiz')">Quiz me</button></div></div>`}
function renderDaily(){const tw=todayWords();document.getElementById('daily').innerHTML=`<div class="card"><h2>Your 30 words today</h2><p class="small">Tap known when comfortable. These rotate daily through the full list.</p></div>`+tw.map((w,i)=>`<div class="card"><div class="listitem"><div><span class="badge">${esc(w.theme)}</span><div class="word">${i+1}. ${esc(w.de)}</div><div class="meaning">${esc(w.en)}</div></div><button class="${p(w).known?'good':''}" onclick="toggleKnown('${esc(w.de)}')">${p(w).known?'Known':'Mark known'}</button></div><p class="example">${esc(w.example)}</p><p class="small">${esc(w.note)}</p></div>`).join('')}
function renderCards(){const fs=filtered();const w=fs[cardIndex%Math.max(1,fs.length)]||words[0];document.getElementById('cards').innerHTML=`
<div class="card grid"><input placeholder="Search German or English..." value="${esc(search)}" oninput="search=this.value;cardIndex=0;render()"><select onchange="activeTheme=this.value;cardIndex=0;render()">${themes().map(t=>`<option ${t===activeTheme?'selected':''}>${esc(t)}</option>`).join('')}</select><p class="small">${fs.length} matching words</p></div>
<div class="card"><span class="badge">${esc(w.theme)}</span><div class="word">${esc(w.de)}</div>${showAnswer?`<div class="meaning">${esc(w.en)}</div><p class="example">${esc(w.example)}</p><p class="small">${esc(w.note)}</p>`:`<p class="small">Try to remember the meaning, then reveal.</p>`}<div class="row"><button class="primary" onclick="showAnswer=!showAnswer;p(words.find(x=>x.de==='${esc(w.de)}')).seen++;render()">${showAnswer?'Hide':'Show answer'}</button><button onclick="cardIndex++;showAnswer=false;render()">Next</button><button class="${p(w).known?'good':''}" onclick="toggleKnown('${esc(w.de)}')">${p(w).known?'Known':'Mark known'}</button><button onclick="toggleFav('${esc(w.de)}')">${p(w).fav?'★ Favorite':'☆ Favorite'}</button><button onclick="editWord('${esc(w.de)}')">Edit meaning</button></div></div>`}
function renderQuiz(){
const wrong=words.filter(w=>p(w).wrong>0);
let pool = quizReviewMode && wrong.length ? wrong : todayWords();
if(!pool.length) pool = words;
const w=pool[quizIndex%pool.length];
const promptText = quizDirection==='en-de' ? w.en : w.de;
const directionLabel = quizDirection==='en-de' ? 'English → German' : 'German → English';
const placeholder = quizDirection==='en-de' ? 'Type the German word...' : 'Type the English meaning...';
document.getElementById('quiz').innerHTML=`
<div class="card">
  <h2>${quizReviewMode?'Wrong-word review':'Daily quiz'}</h2>
  <p class="small">Wrong answers are saved, but the normal quiz continues to the next word.</p>
  <div class="row">
    <button class="${quizDirection==='de-en'?'primary':''}" onclick="quizDirection='de-en';render()">German → English</button>
    <button class="${quizDirection==='en-de'?'primary':''}" onclick="quizDirection='en-de';render()">English → German</button>
  </div>
  <div class="row" style="margin-top:8px">
    <button class="${!quizReviewMode?'primary':''}" onclick="quizReviewMode=false;quizIndex=0;render()">Daily quiz</button>
    <button class="${quizReviewMode?'primary':''}" onclick="quizReviewMode=true;quizIndex=0;render()">Review wrong (${wrong.length})</button>
  </div>
</div>
<div class="card">
  <span class="badge">${esc(w.theme)}</span>
  <p class="small">${directionLabel}</p>
  <div class="word">${esc(promptText)}</div>
  ${quizDirection==='en-de' && w.en==='Add/check meaning' ? '<p class="small">This word has no English meaning yet. Edit it first.</p>' : ''}
  <input id="answer" placeholder="${placeholder}" onkeydown="if(event.key==='Enter')checkQuiz('${esc(w.de)}')">
  <div id="quizResult"></div>
  <div class="row" style="margin-top:10px">
    <button class="primary" onclick="checkQuiz('${esc(w.de)}')">Check</button>
    <button onclick="quizIndex++;render()">Next</button>
    <button onclick="showSolution('${esc(w.de)}')">Show answer</button>
    <button onclick="editWord('${esc(w.de)}')">Edit meaning</button>
  </div>
</div>`}
function showSolution(de){
  const w=words.find(x=>x.de===de);
  const answer = quizDirection==='en-de' ? w.de : w.en;
  const extra = quizDirection==='en-de' ? ('Meaning: '+w.en) : ('German: '+w.de);
  document.getElementById('quizResult').innerHTML=`<p><b>Answer:</b> ${esc(answer)}</p><p class="small">${esc(extra)}</p><p class="example">${esc(w.example)}</p>`;
}
function checkQuiz(de){
const w=words.find(x=>x.de===de),ans=document.getElementById('answer').value;
const ok = quizDirection==='en-de' ? isGermanAnswerCorrect(ans,w.de) : isEnglishAnswerCorrect(ans,w.en);
if(ok){p(w).known=true;p(w).wrong=Math.max(0,p(w).wrong-1);markStudy();}else{p(w).wrong++;}
save();
const correctAnswer = quizDirection==='en-de' ? w.de : w.en;
const supporting = quizDirection==='en-de' ? ('Meaning: '+w.en) : ('German: '+w.de);
document.getElementById('quizResult').innerHTML=`<p class="${ok?'correct':'wrong'}">${ok?'Correct ✅':'Not quite ❌'}</p><p>Answer: <b>${esc(correctAnswer)}</b></p><p class="small">${esc(supporting)}</p><p class="example">${esc(w.example)}</p><div class="row"><button class="primary" onclick="quizIndex++;render()">Next word</button></div>`;
}
function renderAdd(){document.getElementById('add').innerHTML=`<div class="card"><h2>Add your own word</h2><div class="grid"><input id="de" placeholder="German word / phrase"><input id="en" placeholder="English meaning"><input id="theme" placeholder="Theme" value="Custom"><textarea id="example" placeholder="Example sentence"></textarea><input id="note" placeholder="Grammar note / memory tip"><button class="primary" onclick="addWord()">Add word</button></div></div><div class="card"><h2>Backup / Reset</h2><p class="small">Export creates a JSON copy of your words and progress.</p><div class="row"><button onclick="exportData()">Export</button><button class="danger" onclick="resetBuiltIn()">Reset built-in list</button></div></div>`}
function toggleKnown(de){const w=words.find(x=>x.de===de);p(w).known=!p(w).known;if(p(w).known)markStudy();render()}function toggleFav(de){const w=words.find(x=>x.de===de);p(w).fav=!p(w).fav;render()}
function addWord(){const w={de:de.value.trim(),en:en.value.trim(),theme:theme.value.trim()||'Custom',example:example.value.trim(),note:note.value.trim()};if(!w.de||!w.en)return alert('Please enter German and English.');words.unshift(w);save();alert('Added!');render()}
function editWord(de){const w=words.find(x=>x.de===de);const en=prompt('English meaning for '+w.de,w.en);if(en!==null)w.en=en;const ex=prompt('Example sentence',w.example);if(ex!==null)w.example=ex;save();render()}
function exportData(){const blob=new Blob([JSON.stringify({words,progress},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='b1-full-vocab-backup.json';a.click()}
function resetBuiltIn(){if(confirm('Reset to built-in list? Custom browser edits will be removed.')){words=BUILT_IN_WORDS;progress={};save();render()}}
function go(pg){currentPage=pg;render()}document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>go(b.dataset.page));render();
</script>
